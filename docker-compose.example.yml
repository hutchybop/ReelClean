services:

  reelclean:
    image: ghcr.io/hutchybop/reelclean:latest
    container_name: reelclean
    restart: unless-stopped

    ports:
      - "3007:3007"

    env_file:
      - .env

    environment:
      FFPROBE_BIN: ffprobe

    volumes:
      - <local_path_1>:/data/<docker_dir_name_1>
      - <local_path_2>:/data/<docker_dir_name_2>
      # Can define multiple volumes

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3007/health', timeout=5)"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

