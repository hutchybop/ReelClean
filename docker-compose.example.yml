services:

  reelclean:
    image: ghcr.io/hutchybop/reelclean:latest
    container_name: reelclean
    restart: unless-stopped

    env_file:
      - .env

    environment:
      FFPROBE_BIN: ffprobe

    volumes:
      - /mnt/4tb/Storage/Films:/data/4tb-Films
      - /mnt/4tb/Storage/New_Films:/data/4tb-New_Films
      - /home/hutch/downloads/complete:/data/Downloads

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3007/health', timeout=5)"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

    networks:
      - npm_network

networks:
  npm_network:
    external: true
